resources:
  jobs:
    bronze_ingestion:
      name: ${bundle.target}-frc-bronze-ingestion

      tasks:
        - task_key: load_bronze_tables
          spark_python_task:
            python_file: ../../src/frc_sentiment/ingest/load_bronze.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --volume
              - ${var.raw_volume}
              - --source-subdir
              - ${var.source_subdir}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"