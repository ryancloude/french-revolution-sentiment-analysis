resources:
  jobs:
    silver_date_candidates:
      name: ${bundle.target}-frc-silver-date-candidates

      tasks:
        - task_key: build_date_candidates
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/build_date_candidates.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - convertdate==2.4.1