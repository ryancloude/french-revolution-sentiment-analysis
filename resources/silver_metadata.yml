resources:
  jobs:
    silver_metadata:
      name: ${bundle.target}-frc-silver-metadata

      tasks:
        - task_key: parse_metadata
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/parse_metadata.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - convertdate==2.4.1