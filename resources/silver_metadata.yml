resources:
  jobs:
    silver_document_model:
      name: ${bundle.target}-frc-silver-document-model

      tasks:
        - task_key: build_document_model
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/parse_metadata.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - convertdate==2.4.1