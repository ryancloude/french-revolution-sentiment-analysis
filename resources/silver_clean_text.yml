resources:
  jobs:
    silver_document_text_model:
      name: ${bundle.target}-frc-silver-document-text-model

      tasks:
        - task_key: build_document_text_model
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/clean_text.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"