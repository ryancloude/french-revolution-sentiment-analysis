resources:
  jobs:
    silver_clean_text:
      name: ${bundle.target}-frc-silver-clean-text

      tasks:
        - task_key: clean_ocr_text
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/clean_text.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"