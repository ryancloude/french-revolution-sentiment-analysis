resources:
  jobs:
    silver_context_stance_ai_query:
      name: ${bundle.target}-frc-silver-context-stance-ai-query

      tasks:
        - task_key: score_context_stance_ai_query
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/score_context_stance_ai_query.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"