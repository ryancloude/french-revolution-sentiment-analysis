resources:
  jobs:
    silver_figure_mention_stance:
      name: ${bundle.target}-frc-silver-figure-mention-stance

      tasks:
        - task_key: score_figure_mention_stance
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/score_context_stance_ai_query.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"