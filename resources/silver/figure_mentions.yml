resources:
  jobs:
    silver_figure_mentions:
      name: ${bundle.target}-frc-silver-figure-mentions

      tasks:
        - task_key: build_fact_figure_mentions
          spark_python_task:
            python_file: ../src/frc_sentiment/transform/build_figure_mentions.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"