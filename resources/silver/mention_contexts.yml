resources:
  jobs:
    silver_mention_contexts:
      name: ${bundle.target}-frc-silver-mention-contexts

      tasks:
        - task_key: build_mention_contexts
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_mention_contexts.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --words-before
              - "75"
              - --words-after
              - "75"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"