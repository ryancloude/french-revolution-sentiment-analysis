resources:
  jobs:
    silver_select_publication_dates:
      name: ${bundle.target}-frc-silver-select-publication-dates

      tasks:
        - task_key: select_publication_dates
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/select_publication_dates.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"