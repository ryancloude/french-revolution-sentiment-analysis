resources:
  jobs:
    gold_figure_mentions_by_period:
      name: ${bundle.target}-frc-gold-figure-mentions-by-period

      tasks:
        - task_key: build_figure_mentions_by_period
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_figure_stance_by_period.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"