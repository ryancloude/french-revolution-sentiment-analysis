resources:
  jobs:
    gold_figure_stance_by_subject_period:
      name: ${bundle.target}-frc-gold-figure-stance-by-subject-period

      tasks:
        - task_key: build_figure_stance_by_subject_period
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_figure_stance_by_subject_period.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"