resources:
  jobs:
    bootstrap_infrastructure:
      name: ${bundle.target}-frc-bootstrap-infrastructure

      tasks:
        - task_key: create_schema_and_volume
          spark_python_task:
            python_file: ../../src/frc_sentiment/infrastructure/bootstrap.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --volume
              - ${var.raw_volume}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"