resources:
  jobs:
    full_pipeline:
      name: ${bundle.target}-frc-full-pipeline

      tasks:
        - task_key: bootstrap_infrastructure
          spark_python_task:
            python_file: ../../src/frc_sentiment/infrastructure/bootstrap.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --volume
              - ${var.raw_volume}
          environment_key: default

        - task_key: bronze_ingestion
          depends_on:
            - task_key: bootstrap_infrastructure
          spark_python_task:
            python_file: ../../src/frc_sentiment/ingest/load_bronze.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --volume
              - ${var.raw_volume}
              - --source-subdir
              - ${var.source_subdir}
          environment_key: default

        - task_key: silver_document_model
          depends_on:
            - task_key: bronze_ingestion
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_document_model.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: silver_document_text_model
          depends_on:
            - task_key: silver_document_model
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_document_text_model.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: silver_ai_publication_date_candidates
          depends_on:
            - task_key: silver_document_text_model
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_ai_publication_date_candidates.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: silver_select_publication_dates
          depends_on:
            - task_key: silver_ai_publication_date_candidates
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/select_publication_dates.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: silver_figure_model
          depends_on:
            - task_key: silver_select_publication_dates
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_figure_model.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --figures-path
              - data/lookup/figures.csv
          environment_key: default

        - task_key: silver_figure_mentions
          depends_on:
            - task_key: silver_figure_model
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_figure_mentions.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: silver_mention_contexts
          depends_on:
            - task_key: silver_figure_mentions
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_mention_contexts.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: silver_figure_mention_stance
          depends_on:
            - task_key: silver_mention_contexts
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_figure_mention_stance.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: gold_figure_mentions_by_period
          depends_on:
            - task_key: silver_figure_mention_stance
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_figure_mentions_by_period.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: gold_figure_stance_by_period
          depends_on:
            - task_key: silver_figure_mention_stance
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_figure_stance_by_period.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: gold_figure_stance_by_document
          depends_on:
            - task_key: silver_figure_mention_stance
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_figure_stance_by_document.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: gold_top_stance_contexts
          depends_on:
            - task_key: silver_figure_mention_stance
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_top_stance_contexts.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: gold_figure_stance_by_creator_period
          depends_on:
            - task_key: gold_figure_stance_by_document
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_figure_stance_by_creator_period.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: gold_figure_stance_by_subject_period
          depends_on:
            - task_key: gold_figure_stance_by_document
          spark_python_task:
            python_file: ../../src/frc_sentiment/gold/build_figure_stance_by_subject_period.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

        - task_key: silver_quality_summary
          depends_on:
            - task_key: gold_figure_mentions_by_period
            - task_key: gold_figure_stance_by_period
            - task_key: gold_figure_stance_by_document
            - task_key: gold_top_stance_contexts
            - task_key: gold_figure_stance_by_creator_period
            - task_key: gold_figure_stance_by_subject_period
          spark_python_task:
            python_file: ../../src/frc_sentiment/transform/build_quality_summary.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - convertdate==2.4.1