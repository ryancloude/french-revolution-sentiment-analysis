bundle:
  name: french-revolution-sentiment-analysis

include:
  - resources/**/*.yml

variables:
  catalog:
    description: Unity Catalog catalog for project objects
    default: workspace

  source_subdir:
    description: Raw volume subdirectory to ingest
    default: full

  schema:
    description: Schema containing project tables and volumes
    default: frc_sentiment

  raw_volume:
    description: Volume containing raw source files
    default: raw

sync:
  include:
    - src/**
    - notebooks/**
    - data/lookup/**

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-b1968060-7d4e.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}